<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>One SIOMAi POS</title>
<meta name="theme-color" content="#FF6B35">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial; }
body { background: #f5f5f5; padding-bottom: 20px; padding-top: 60px; }
.header { background: #FF6B35; color: white; padding: 12px; text-align: center; font-size: 18px; font-weight: bold; position: fixed; top: 0; left: 0; right: 0; z-index: 100; }
.summary { background: #FF8C42; color: white; margin: 8px; padding: 12px; border-radius: 8px; position: relative; z-index: 1; }
.summary-row { display: flex; justify-content: space-between; margin: 3px 0; font-size: 14px; }
.summary-net { font-size: 16px; font-weight: bold; border-top: 1px solid white; padding-top: 4px; margin-top: 4px; }
.btn-small { background: white; color: #FF6B35; border: none; padding: 6px 10px; border-radius: 5px; margin: 2px; cursor: pointer; position: relative; z-index: 2; font-size: 12px; }
.card { background: white; margin: 8px; padding: 12px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); position: relative; z-index: 1; }
.card h3 { font-size: 16px; margin-bottom: 8px; }
.btn { background: #FF6B35; color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; position: relative; z-index: 2; font-size: 14px; }
.btn:active { background: #E55A2B; }
.btn:disabled { background: #ccc; cursor: not-allowed; opacity: 0.6; }
.btn-print { background: #28a745; color: white; border: none; padding: 12px; border-radius: 5px; cursor: pointer; width: 100%; margin-top: 8px; font-size: 15px; font-weight: bold; }
.btn-production { background: #2196F3; color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 9px; width: 48%; margin-top: 3px; }
.btn-price { background: #FF9800; color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 9px; width: 48%; margin-top: 3px; margin-left: 4%; }
input { padding: 6px; border: 1px solid #ddd; border-radius: 5px; margin: 3px; position: relative; z-index: 2; font-size: 14px; }
.category-tabs { display: flex; gap: 4px; margin-bottom: 8px; overflow-x: auto; padding-bottom: 4px; }
.cat-btn { background: #eee; border: none; padding: 6px 12px; border-radius: 15px; white-space: nowrap; cursor: pointer; position: relative; z-index: 2; font-size: 12px; }
.cat-btn.active { background: #FF6B35; color: white; }
.product-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
.product-item { border: 1px solid #ddd; padding: 6px; border-radius: 6px; text-align: center; position: relative; }
.product-item h4 { font-size: 11px; margin-bottom: 2px; font-weight: 600; }
.product-item.price { font-size: 14px; font-weight: bold; color: #FF6B35; margin: 2px 0; }
.stock-badge { position: absolute; top: 3px; right: 3px; background: #4CAF50; color: white; border-radius: 50%; width: 20px; height: 20px; line-height: 20px; font-size: 10px; }
.stock-badge.low { background: #f44336; }
.stock-badge.zero { background: #999; }
.cart-item { display: flex; justify-content: space-between; margin: 4px 0; align-items: center; font-size: 14px; }
.checkout-btn { width: 100%; margin-top: 8px; padding: 12px; font-size: 15px; }
.cat-header { background: #FF6B35; color: white; padding: 4px 8px; margin: 8px 0 4px 0; border-radius: 4px; font-size: 12px; font-weight: bold; grid-column: 1 / -1; }
.qty-control { display: flex; gap: 3px; align-items: center; margin-top: 4px; position: relative; }
.qty-input { width: 35px; padding: 4px; text-align: center; border: none; border-radius: 4px; font-size: 11px; font-weight: bold; background: #FF6B35; color: white; }
.btn-add-small { flex: 1; background: #FF6B35; color: white; border: none; padding: 4px; border-radius: 4px; cursor: pointer; font-size: 11px; }
.btn-add-small:disabled { background: #ccc; }
.stock-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; max-height: 300px; overflow-y: auto; }
.stock-item { border: 1px solid #ddd; padding: 6px; border-radius: 6px; background: #fafafa; text-align: center; }
.stock-item-name { font-size: 10px; font-weight: 600; margin-bottom: 2px; height: 24px; display: flex; align-items: center; justify-content: center; }
.stock-item-price { font-size: 12px; font-weight: bold; color: #FF6B35; margin: 2px 0; }
.stock-item-qty { font-size: 11px; color: #666; margin-bottom: 3px; }
.stock-input { width: 100%; padding: 3px; text-align: center; border: 1px solid #ddd; border-radius: 3px; font-size: 10px; margin-bottom: 3px; }
.price-input { width: 100%; padding: 3px; text-align: center; border: 1px solid #FF9800; border-radius: 3px; font-size: 10px; margin-bottom: 3px; }
.btn-group { display: flex; }
.hidden { display: none; }
@media print {
  @page {
    size: 58mm auto;
    margin: 0;
  }
  body * { visibility: hidden; }
  #receiptPrint, #receiptPrint * { visibility: visible; }
  #receiptPrint {
    position: absolute;
    left: 0;
    top: 0;
    width: 58mm!important;
    padding: 5mm!important;
    font-size: 12px!important;
  }
.header,.summary,.card { display: none!important; }
}
</style>
</head>
<body>
<div class="header">🥟 One SIOMAi POS</div>

<div class="summary">
<div class="summary-row"><span>Sales:</span><span>₱<span id="sales">0.00</span></span></div>
<div class="summary-row"><span>Expenses:</span><span>₱<span id="expenses">0.00</span></span></div>
<div class="summary-row"><span>Items Sold:</span><span><span id="itemsSold">0</span> pcs</span></div>
<div class="summary-row"><span>Transactions:</span><span id="transCount">0</span></div>
<div class="summary-row summary-net"><span>Net:</span><span>₱<span id="net">0.00</span></span></div>
<button class="btn-small" onclick="resetDay()">Reset Day</button>
<button class="btn-small" onclick="printReport()">Print Report</button>
<button class="btn-small" onclick="resetAllData()">🔄 RESET ALL</button>
</div>

<div class="card">
<h3>📦 Stock + Daily Production + Price Edit</h3>
<div id="productionList" class="stock-grid"></div>
<button class="btn-small" onclick="addStock()" style="margin-top:8px;">+ Add New Product</button>
</div>

<div class="card">
<h3>Add Expense</h3>
<input id="expenseItem" placeholder="Item: yelo, uling">
<input id="expenseAmt" type="number" placeholder="Amount">
<button class="btn" onclick="addExpense()">Add</button>
</div>

<div class="card">
<h3>Products</h3>
<div class="category-tabs" id="categoryTabs">
<button class="cat-btn active" onclick="filterCategory('All',this)">All</button>
<button class="cat-btn" onclick="filterCategory('65\'s',this)">65's</button>
<button class="cat-btn" onclick="filterCategory('30\'s',this)">30's</button>
<button class="cat-btn" onclick="filterCategory('BIG SIOMAI',this)">BIG</button>
<button class="cat-btn" onclick="filterCategory('DUMPLINGS',this)">DUMPLINGS</button>
<button class="cat-btn" onclick="filterCategory('SIOPAO',this)">SIOPAO</button>
<button class="cat-btn" onclick="filterCategory('EXTRAS',this)">EXTRAS</button>
</div>
<div class="product-grid" id="productGrid"></div>
</div>

<div class="card">
<h3>🛒 Cart</h3>
<div id="cartList"></div>
<div style="font-size:16px;font-weight:bold;color:#FF6B35;margin:6px 0">Total: ₱<span id="cartTotal">0</span></div>
<input id="cashAmt" type="number" placeholder="Enter cash amount" style="width:100%;padding:8px">
<div style="font-size:14px;font-weight:bold;color:#28a745;margin:6px 0">Change: ₱<span id="changeAmt">0</span></div>
<button class="btn checkout-btn" onclick="checkout()">Checkout + Print</button>
</div>

<div id="receiptPrint" class="hidden"></div>

<script>
var products = [
  {id:1,name:'Pork 65\'s',price:150,stock:105,cat:'65\'s'},
  {id:2,name:'Chicken 65\'s',price:150,stock:100,cat:'65\'s'},
  {id:5,name:'Pork 30\'s',price:80,stock:93,cat:'30\'s'},
  {id:6,name:'Chicken 30\'s',price:80,stock:100,cat:'30\'s'},
  {id:8,name:'Pork Big Siomai',price:120,stock:86,cat:'BIG SIOMAI'},
  {id:10,name:'Japanese Big Siomai',price:150,stock:100,cat:'BIG SIOMAI'},
  {id:12,name:'Sharksfin',price:110,stock:92,cat:'DUMPLINGS'},
  {id:13,name:'Gyoza',price:110,stock:100,cat:'DUMPLINGS'},
  {id:27,name:'Jumbo Asado',price:200,stock:50,cat:'SIOPAO'},
  {id:19,name:'Chili Garlic',price:75,stock:999,cat:'EXTRAS'},
  {id:28,name:'Siopao Sauce',price:0,stock:999,cat:'EXTRAS'}
];

var cart = [];
var salesData = [];
var expensesData = [];
var currentFilter = 'All';
var lastTransaction = null;

function initApp(){
  var savedProducts = localStorage.getItem('products');
  var savedSales = localStorage.getItem('sales');
  var savedExpenses = localStorage.getItem('expenses');
  if(savedProducts) products = JSON.parse(savedProducts);
  if(savedSales) salesData = JSON.parse(savedSales);
  if(savedExpenses) expensesData = JSON.parse(savedExpenses);
  renderProducts();
  renderProduction();
  updateSummary();
}

function saveData(){
  localStorage.setItem('products',JSON.stringify(products));
  localStorage.setItem('sales',JSON.stringify(salesData));
  localStorage.setItem('expenses',JSON.stringify(expensesData));
}

function filterCategory(cat,el){
  currentFilter = cat;
  var tabs = document.querySelectorAll('.cat-btn');
  for(var i=0;i<tabs.length;i++) tabs[i].classList.remove('active');
  el.classList.add('active');
  renderProducts();
}

function renderProducts(){
  var filtered = currentFilter==='All'? products : products.filter(function(p){return p.cat===currentFilter});
  var html = '';
  var lastCat = '';
  for(var i=0;i<filtered.length;i++){
    var p = filtered[i];
    if(p.cat!== lastCat && currentFilter==='All'){
      html += '<div class="cat-header">'+p.cat+'</div>';
      lastCat = p.cat;
    }
    var cartQty = 0;
    for(var j=0;j<cart.length;j++){
      if(cart[j].id===p.id){cartQty=cart[j].qty;break;}
    }
    html += '<div class="product-item">';
    html += '<div class="stock-badge '+(p.stock<=10?'low':p.stock==0?'zero':'')+'">'+p.stock+'</div>';
    html += '<h4>'+p.name+'</h4>';
    html += '<div class="price">₱'+p.price+'</div>';
    html += '<div class="qty-control">';
    html += '<input type="number" class="qty-input" id="qty-'+p.id+'" value="'+(cartQty>0?cartQty:1)+'" readonly>';
    html += '<button class="btn-add-small" onclick="addToCartQty('+p.id+')" '+(p.stock<=0?'disabled':'')+'>+Add</button>';
    html += '</div></div>';
  }
  document.getElementById('productGrid').innerHTML = html;
}

function addToCartQty(id){
  var p = null;
  for(var i=0;i<products.length;i++){
    if(products[i].id===id){p=products[i];break;}
  }
  if(!p || p.stock<=0){alert('Out of stock!');return}
  p.stock -= 1;
  var item = null;
  for(var i=0;i<cart.length;i++){
    if(cart[i].id===id){item=cart[i];break;}
  }
  if(item){
    item.qty+=1;
  }else{
    cart.push({id:p.id,name:p.name,price:p.price,qty:1});
  }
  saveData();
  renderCart();
  renderProducts();
  renderProduction();
}

function renderCart(){
  var html = '';
  for(var i=0;i<cart.length;i++){
    var item = cart[i];
    html += '<div class="cart-item">';
    html += '<span>'+item.name+' x'+item.qty+'</span>';
    html += '<span>₱'+(item.price*item.qty)+' <button onclick="removeFromCart('+item.id+')" style="background:red;color:white;border:none;padding:2px 5px;border-radius:3px;margin-left:5px">X</button></span>';
    html += '</div>';
  }
  document.getElementById('cartList').innerHTML = html;
  updateTotal();
}

function removeFromCart(id){
  for(var i=0;i<cart.length;i++){
    if(cart[i].id===id){
      var p = null;
      for(var j=0;j<products.length;j++){
        if(products[j].id===id){p=products[j];break;}
      }
      if(p) p.stock += cart[i].qty;
      cart.splice(i,1);
      break;
    }
  }
  saveData();
  renderCart();
  renderProducts();
  renderProduction();
}

function updateTotal(){
  var total = 0;
  for(var i=0;i<cart.length;i++) total += cart[i].price*cart[i].qty;
  document.getElementById('cartTotal').textContent = total.toFixed(2);
  var cash = parseFloat(document.getElementById('cashAmt').value)||0;
  document.getElementById('changeAmt').textContent = Math.max(0,cash-total).toFixed(2);
}

document.getElementById('cashAmt').addEventListener('input',updateTotal);

function checkout(){
  if(cart.length===0){alert('Cart is empty!');return}
  var total = 0;
  for(var i=0;i<cart.length;i++) total += cart[i].price*cart[i].qty;
  var cash = parseFloat(document.getElementById('cashAmt').value)||0;
  if(cash<total){alert('Insufficient cash!');return}

  var transaction = {
    id:Date.now(),
    date:new Date().toLocaleString(),
    items:cart.slice(),
    total:total,
    cash:cash,
    change:cash-total
  };

  salesData.push(transaction);
  lastTransaction = transaction;
  saveData();

  cart = [];
  document.getElementById('cashAmt').value = '';
  renderCart();
  renderProducts();
  renderProduction();
  updateSummary();
  printReceipt();
}

function printReceipt(){
  if(!lastTransaction){alert('No transaction to print!');return}
  var t = lastTransaction;
  var itemsHtml = '';
  for(var i=0;i<t.items.length;i++){
    var it = t.items[i];
    itemsHtml += '<div style="display:flex;justify-content:space-between;margin:2px 0;"><span>'+it.name+' x'+it.qty+'</span><span>₱'+(it.price*it.qty)+'</span></div>';
  }

  document.getElementById('receiptPrint').innerHTML =
    '<div style="text-align:center;font-weight:bold;font-size:14px;">ONE SIOMAI</div>'+
    '<div style="text-align:center;font-size:11px;margin-bottom:5px;">Valenzuela City</div>'+
    '<div style="text-align:center;font-size:10px;border-bottom:1px dashed #000;padding-bottom:5px;margin-bottom:5px;">'+t.date+'</div>'+
    itemsHtml+
    '<div style="border-top:1px dashed #000;margin-top:5px;padding-top:5px;">'+
    '<div style="display:flex;justify-content:space-between;font-weight:bold;"><span>TOTAL:</span><span>₱'+t.total.toFixed(0)+'</span></div>'+
    '<div style="display:flex;justify-content:space-between;"><span>CASH:</span><span>₱'+t.cash.toFixed(0)+'</span></div>'+
    '<div style="display:flex;justify-content:space-between;font-weight:bold;"><span>CHANGE:</span><span>₱'+t.change.toFixed(0)+'</span></div>'+
    '</div>'+
    '<div style="text-align:center;margin-top:8px;border-top:1px dashed #000;padding-top:5px;font-size:11px;">Thank you!</div>';

  document.getElementById('receiptPrint').classList.remove('hidden');
  setTimeout(function(){
    window.print();
    document.getElementById('receiptPrint').classList.add('hidden');
  },100);
}

// FIX #1: MAY EDIT PRICE NA SA STOCK
function renderProduction(){
  var html = '';
  for(var i=0;i<products.length;i++){
    var p = products[i];
    html += '<div class="stock-item">';
    html += '<div class="stock-item-name">'+p.name+'</div>';
    html += '<div class="stock-item-price">₱'+p.price+'</div>';
    html += '<div class="stock-item-qty">Stock: '+p.stock+'</div>';
    html += '<input type="number" class="stock-input" id="prod-'+p.id+'" placeholder="+Stock" min="1">';
    html += '<input type="number" class="price-input" id="price-'+p.id+'" placeholder="₱Price" value="'+p.price+'" min="0">';
    html += '<div class="btn-group">';
    html += '<button class="btn-production" onclick="addProduction('+p.id+')">+Stock</button>';
    html += '<button class="btn-price" onclick="updatePrice('+p.id+')">₱Price</button>';
    html += '</div></div>';
  }
  document.getElementById('productionList').innerHTML = html;
}

function addProduction(id){
  var input = document.getElementById('prod-'+id);
  var addQty = parseInt(input.value)||0;
  if(addQty<=0){alert('Enter valid quantity!');return}
  for(var i=0;i<products.length;i++){
    if(products[i].id===id){
      products[i].stock += addQty;
      break;
    }
  }
  saveData();
  renderProducts();
  renderProduction();
  input.value = '';
}

// FIX #2: EDIT PRICE FUNCTION
function updatePrice(id){
  var input = document.getElementById('price-'+id);
  var newPrice = parseFloat(input.value);
  if(isNaN(newPrice) || newPrice<0){alert('Enter valid price!');return}
  for(var i=0;i<products.length;i++){
    if(products[i].id===id){
      products[i].price = newPrice;
      break;
    }
  }
  saveData();
  renderProducts();
  renderProduction();
  alert('Price updated to ₱'+newPrice);
}

function addStock(){
  var name = prompt('Product name:');
  var price = parseInt(prompt('Price:'));
  var stock = parseInt(prompt('Initial stock:'));
  if(name && price && stock){
    products.push({id:Date.now(),name:name,price:price,stock:stock,cat:'EXTRAS'});
    saveData();
    renderProducts();
    renderProduction();
  }
}

function addExpense(){
  var item = document.getElementById('expenseItem').value.trim();
  var amt = parseFloat(document.getElementById('expenseAmt').value)||0;
  if(!item || amt<=0){alert('Enter valid item and amount!');return}
  expensesData.push({id:Date.now(),item:item,amount:amt,date:new Date().toLocaleString()});
  saveData();
  updateSummary();
  document.getElementById('expenseItem').value='';
  document.getElementById('expenseAmt').value='';
  alert('Expense added!');
}

function updateSummary(){
  var totalSales = 0;
  for(var i=0;i<salesData.length;i++) totalSales += salesData[i].total;
  var totalExp = 0;
  for(var i=0;i<expensesData.length;i++) totalExp += expensesData[i].amount;
  var items = 0;
  for(var i=0;i<salesData.length;i++){
    for(var j=0;j<salesData[i].items.length;j++) items += salesData[i].items[j].qty;
  }
  document.getElementById('sales').textContent = totalSales.toFixed(2);
  document.getElementById('expenses').textContent = totalExp.toFixed(2);
  document.getElementById('net').textContent = (totalSales - totalExp).toFixed(2);
  document.getElementById('itemsSold').textContent = items;
  document.getElementById('transCount').textContent = salesData.length;
}

function resetDay(){
  if(confirm('Reset all data for new day?')){
    salesData = [];
    expensesData = [];
    cart = [];
    saveData();
    renderCart();
    updateSummary();
  }
}

function resetAllData(){
  if(confirm('🔄 RESET ALL: Delete all products and data? This will clear localStorage!')){
    localStorage.clear();
    location.reload();
  }
}

function printReport(){
  alert('Printing report...');
  window.print();
}

initApp();
</script>
</body>
</html>
