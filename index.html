<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>One SIOMAi POS</title>
<meta name="theme-color" content="#FF6B35">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial; }
body { background: #f5f5f5; padding-bottom: 20px; padding-top: 60px; }
.header { background: #FF6B35; color: white; padding: 12px; text-align: center; font-size: 18px; font-weight: bold; position: fixed; top: 0; left: 0; right: 0; z-index: 100; }
.summary { background: #FF8C42; color: white; margin: 8px; padding: 12px; border-radius: 8px; position: relative; z-index: 1; }
.summary-row { display: flex; justify-content: space-between; margin: 3px 0; font-size: 14px; }
.summary-net { font-size: 16px; font-weight: bold; border-top: 1px solid white; padding-top: 4px; margin-top: 4px; }
.btn-small { background: white; color: #FF6B35; border: none; padding: 6px 10px; border-radius: 5px; margin: 2px; cursor: pointer; position: relative; z-index: 2; font-size: 12px; }
.card { background: white; margin: 8px; padding: 12px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); position: relative; z-index: 1; }
.card h3 { font-size: 16px; margin-bottom: 8px; }
.btn { background: #FF6B35; color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; position: relative; z-index: 2; font-size: 14px; }
.btn:active { background: #E55A2B; }
.btn:disabled { background: #ccc; cursor: not-allowed; opacity: 0.6; }
.btn-print { background: #28a745; color: white; border: none; padding: 12px; border-radius: 5px; cursor: pointer; width: 100%; margin-top: 8px; font-size: 15px; font-weight: bold; }
.btn-production { background: #2196F3; color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 9px; width: 48%; margin-top: 3px; }
.btn-price { background: #FF9800; color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 9px; width: 48%; margin-top: 3px; margin-left: 4%; }
input, select { padding: 6px; border: 1px solid #ddd; border-radius: 5px; margin: 3px; position: relative; z-index: 2; font-size: 14px; }
.category-tabs { display: flex; gap: 4px; margin-bottom: 8px; overflow-x: auto; padding-bottom: 4px; }
.cat-btn { background: #eee; border: none; padding: 6px 12px; border-radius: 15px; white-space: nowrap; cursor: pointer; position: relative; z-index: 2; font-size: 12px; }
.cat-btn.active { background: #FF6B35; color: white; }
.product-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
.product-item { border: 1px solid #ddd; padding: 6px; border-radius: 6px; text-align: center; position: relative; }
.product-item h4 { font-size: 11px; margin-bottom: 2px; font-weight: 600; }
.product-item.price { font-size: 14px; font-weight: bold; color: #FF6B35; margin: 2px 0; }
.stock-badge { display: none; }
.cart-item { display: flex; justify-content: space-between; margin: 4px 0; align-items: center; font-size: 14px; }
.checkout-btn { width: 100%; margin-top: 8px; padding: 12px; font-size: 15px; }
.cat-header { background: #FF6B35; color: white; padding: 4px 8px; margin: 8px 0 4px 0; border-radius: 4px; font-size: 12px; font-weight: bold; grid-column: 1 / -1; }
.qty-control { display: flex; gap: 3px; align-items: center; margin-top: 4px; position: relative; }
.qty-input { width: 35px; padding: 4px; text-align: center; border: 1px solid #ddd; border-radius: 4px; font-size: 11px; font-weight: bold; background: white; color: #333; }
.btn-add-small { flex: 1; background: #FF6B35; color: white; border: none; padding: 4px; border-radius: 4px; cursor: pointer; font-size: 11px; }
.btn-add-small:disabled { background: #ccc; }
.stock-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; max-height: 400px; overflow-y: auto; }
.stock-item { border: 1px solid #ddd; padding: 6px; border-radius: 6px; background: #fafafa; text-align: center; }
.stock-item-name { font-size: 10px; font-weight: 600; margin-bottom: 2px; height: 24px; display: flex; align-items: center; justify-content: center; }
.stock-item-price { font-size: 12px; font-weight: bold; color: #FF6B35; margin: 2px 0; }
.stock-item-qty { font-size: 11px; color: #666; margin-bottom: 3px; }
.stock-input { width: 100%; padding: 3px; text-align: center; border: 1px solid #ddd; border-radius: 3px; font-size: 10px; margin-bottom: 3px; }
.price-input { width: 100%; padding: 3px; text-align: center; border: 1px solid #FF9800; border-radius: 3px; font-size: 10px; margin-bottom: 3px; background: white; }
.btn-group { display: flex; }
.hidden { display: none; }
.modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 200; }
.modal-content { background: white; margin: 50px auto; padding: 20px; border-radius: 8px; width: 90%; max-width: 400px; }
.modal h3 { margin-bottom: 15px; }
.modal input,.modal select { width: 100%; margin: 5px 0; }
.modal-btns { display: flex; gap: 10px; margin-top: 15px; }
.modal-btns button { flex: 1; }
@media print {
  @page { size: 58mm auto!important; margin: 0!important; }
  html, body { width: 58mm!important; height: fit-content!important; margin: 0!important; padding: 0!important; overflow: hidden!important; }
  body * { visibility: hidden!important; }
  #receiptPrint, #receiptPrint * { visibility: visible!important; }
  #receiptPrint { position: absolute!important; left: 0!important; top: 0!important; width: 54mm!important; padding: 2mm!important; font-family: 'Courier New', monospace!important; font-size: 11px!important; line-height: 1.1!important; background: white!important; page-break-after: avoid!important; page-break-inside: avoid!important; }
}
</style>
</head>
