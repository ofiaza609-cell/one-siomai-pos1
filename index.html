<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>One SIOMAi POS</title>
<meta name="theme-color" content="#FF6B35">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial; }
body { background: #f5f5f5; padding-bottom: 20px; padding-top: 60px; }
.header { background: #FF6B35; color: white; padding: 12px; text-align: center; font-size: 18px; font-weight: bold; position: fixed; top: 0; left: 0; right: 0; z-index: 100; }
.summary { background: #FF8C42; color: white; margin: 8px; padding: 12px; border-radius: 8px; position: relative; z-index: 1; }
.summary-row { display: flex; justify-content: space-between; margin: 3px 0; font-size: 14px; }
.summary-net { font-size: 16px; font-weight: bold; border-top: 1px solid white; padding-top: 4px; margin-top: 4px; }
.btn-small { background: white; color: #FF6B35; border: none; padding: 6px 10px; border-radius: 5px; margin: 2px; cursor: pointer; position: relative; z-index: 2; font-size: 12px; }
.card { background: white; margin: 8px; padding: 12px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); position: relative; z-index: 1; }
.card h3 { font-size: 16px; margin-bottom: 8px; }
.btn { background: #FF6B35; color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; position: relative; z-index: 2; font-size: 14px; }
.btn:active { background: #E55A2B; }
.btn:disabled { background: #ccc; cursor: not-allowed; opacity: 0.6; }
.btn-print { background: #28a745; color: white; border: none; padding: 12px; border-radius: 5px; cursor: pointer; width: 100%; margin-top: 8px; font-size: 15px; font-weight: bold; }
input { padding: 6px; border: 1px solid #ddd; border-radius: 5px; margin: 3px; position: relative; z-index: 2; font-size: 14px; }
.category-tabs { display: flex; gap: 4px; margin-bottom: 8px; overflow-x: auto; padding-bottom: 4px; }
.cat-btn { background: #eee; border: none; padding: 6px 12px; border-radius: 15px; white-space: nowrap; cursor: pointer; position: relative; z-index: 2; font-size: 12px; }
.cat-btn.active { background: #FF6B35; color: white; }
.product-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
.product-item { border: 1px solid #ddd; padding: 6px; border-radius: 6px; text-align: center; position: relative; }
.product-item h4 { font-size: 11px; margin-bottom: 2px; font-weight: 600; }
.product-item.price { font-size: 14px; font-weight: bold; color: #FF6B35; margin: 2px 0; }
.product-item.cat { font-size: 9px; color: #999; }
.product-item.stock { font-size: 10px; color: #666; }
.stock-badge { position: absolute; top: 3px; right: 3px; background: #4CAF50; color: white; border-radius: 50%; width: 20px; height: 20px; line-height: 20px; font-size: 10px; }
.stock-badge.low { background: #f44336; }
.stock-badge.zero { background: #999; }
.cart-badge { position: absolute; top: 3px; left: 3px; background: #FF6B35; color: white; border-radius: 50%; width: 20px; height: 20px; line-height: 20px; font-size: 10px; font-weight: bold; }
.cart-item { display: flex; justify-content: space-between; margin: 4px 0; align-items: center; font-size: 14px; }
.checkout-btn { width: 100%; margin-top: 8px; padding: 12px; font-size: 15px; }
.prod-row { display: flex; justify-content: space-between; margin: 2px 0; font-size: 12px; align-items: center; }
.cat-header { background: #FF6B35; color: white; padding: 4px 8px; margin: 8px 0 4px 0; border-radius: 4px; font-size: 12px; font-weight: bold; grid-column: 1 / -1; }
.qty-control { display: flex; gap: 3px; align-items: center; margin-top: 4px; }
.qty-input { width: 35px; padding: 4px; text-align: center; border: 1px solid #ddd; border-radius: 4px; font-size: 11px; font-weight: bold; }
.btn-add-small { flex: 1; background: #FF6B35; color: white; border: none; padding: 4px; border-radius: 4px; cursor: pointer; font-size: 11px; }
.btn-add-small:disabled { background: #ccc; }
.hidden { display: none; }
@media print {
  body * { visibility: hidden; }
  #receiptPrint, #receiptPrint * { visibility: visible; }
  #receiptPrint { position: absolute; left: 0; top: 0; width: 100%; }
}
</style>
</head>
<body>
<div class="header">🥟 One SIOMAi POS</div>

<div class="summary">
<div class="summary-row"><span>Sales:</span><span>₱<span id="sales">0.00</span></span></div>
<div class="summary-row"><span>Expenses:</span><span>₱<span id="expenses">0.00</span></span></div>
<div class="summary-row"><span>Items Sold:</span><span><span id="itemsSold">0</span> pcs</span></div>
<div class="summary-row"><span>Transactions:</span><span id="transCount">0</span></div>
<div class="summary-row summary-net"><span>Net:</span><span>₱<span id="net">0.00</span></span></div>
<button class="btn-small" onclick="resetDay()">Reset Day</button>
<button class="btn-small" onclick="printReport()">Print Report</button>
<button class="btn-small" onclick="manualBackup()">Backup</button>
</div>

<div class="card">
<h3>📦 Stock</h3>
<div id="productionList" style="max-height:150px; overflow-y:auto;"></div>
<button class="btn-small" onclick="addStock()">+ Add Stock</button>
</div>

<div class="card">
<h3>Add Expense</h3>
<input id="expenseItem" placeholder="Item: yelo, uling">
<input id="expenseAmt" type="number" placeholder="Amount">
<button class="btn" onclick="addExpense()">Add</button>
</div>

<div class="card">
<h3>Products</h3>
<div class="category-tabs" id="categoryTabs">
<button class="cat-btn active" onclick="filterCategory('All',this)">All</button>
<button class="cat-btn" onclick="filterCategory('65\'s',this)">65's</button>
<button class="cat-btn" onclick="filterCategory('30\'s',this)">30's</button>
<button class="cat-btn" onclick="filterCategory('BIG SIOMAI',this)">BIG</button>
<button class="cat-btn" onclick="filterCategory('DUMPLINGS',this)">DUMPLINGS</button>
<button class="cat-btn" onclick="filterCategory('SIOPAO',this)">SIOPAO</button>
<button class="cat-btn" onclick="filterCategory('EXTRAS',this)">EXTRAS</button>
</div>
<div class="product-grid" id="productGrid"></div>
</div>

<div class="card">
<h3>🛒 Cart</h3>
<div id="cartList"></div>
<div style="font-size:16px;font-weight:bold;color:#FF6B35;margin:6px 0">Total: ₱<span id="cartTotal">0</span></div>
<input id="cashAmt" type="number" placeholder="Enter cash amount" style="width:100%;padding:8px">
<div style="font-size:14px;font-weight:bold;color:#28a745;margin:6px 0">Change: ₱<span id="changeAmt">0</span></div>
<button class="btn checkout-btn" onclick="checkout()">Checkout</button>
<button class="btn-print" onclick="printReceipt()">🖨️ PRINT RECEIPT</button>
</div>

<div id="receiptPrint" class="hidden" style="padding:20px;font-family:monospace;font-size:12px;max-width:300px;margin:0 auto"></div>

<script>
var products = [
  {id:1,name:'Pork 65\'s',price:150,stock:105,cat:'65\'s'},
  {id:2,name:'Beef 65\'s',price:150,stock:100,cat:'65\'s'},
  {id:3,name:'Chicken 65\'s',price:150,stock:94,cat:'65\'s'},
  {id:4,name:'Japanese 65\'s',price:150,stock:94,cat:'65\'s'},
  {id:16,name:'Shrimp 65\'s',price:150,stock:100,cat:'65\'s'},
  {id:5,name:'Pork 30\'s',price:80,stock:93,cat:'30\'s'},
  {id:6,name:'Beef 30\'s',price:80,stock:100,cat:'30\'s'},
  {id:7,name:'Chicken 30\'s',price:80,stock:100,cat:'30\'s'},
  {id:17,name:'Japanese 30\'s',price:120,stock:89,cat:'30\'s'},
  {id:8,name:'BIG Pork',price:120,stock:86,cat:'BIG SIOMAI'},
  {id:9,name:'BIG Beef',price:120,stock:97,cat:'BIG SIOMAI'},
  {id:10,name:'BIG Japanese',price:150,stock:100,cat:'BIG SIOMAI'},
  {id:11,name:'BIG Chicken',price:120,stock:100,cat:'BIG SIOMAI'},
  {id:12,name:'Sharksfin',price:80,stock:92,cat:'DUMPLINGS'},
  {id:13,name:'Gyoza',price:80,stock:100,cat:'DUMPLINGS'},
  {id:18,name:'Hakaw',price:100,stock:100,cat:'DUMPLINGS'},
  {id:14,name:'Asado Siopao',price:35,stock:60,cat:'SIOPAO'},
  {id:15,name:'Bola-Bola',price:35,stock:60,cat:'SIOPAO'},
  {id:22,name:'Chicken Siopao',price:35,stock:60,cat:'SIOPAO'},
  {id:23,name:'Combi Siopao',price:40,stock:60,cat:'SIOPAO'},
  {id:24,name:'Mini Asado',price:20,stock:100,cat:'SIOPAO'},
  {id:25,name:'Mini Bola-Bola',price:20,stock:100,cat:'SIOPAO'},
  {id:19,name:'Chili Garlic',price:5,stock:999,cat:'EXTRAS'},
  {id:20,name:'Toyomansi',price:5,stock:999,cat:'EXTRAS'},
  {id:21,name:'Extra Rice',price:15,stock:200,cat:'EXTRAS'},
  {id:26,name:'Chili Oil',price:10,stock:200,cat:'EXTRAS'}
];

var cart = [];
var salesData = JSON.parse(localStorage.getItem('sales') || '[]');
var expensesData = JSON.parse(localStorage.getItem('expenses') || '[]');
var currentFilter = 'All';
var lastTransaction = null;

function saveData(){
  localStorage.setItem('products',JSON.stringify(products));
  localStorage.setItem('sales',JSON.stringify(salesData));
  localStorage.setItem('expenses',JSON.stringify(expensesData));
}

function loadData(){
  var savedProducts = localStorage.getItem('products');
  if(savedProducts) products = JSON.parse(savedProducts);
  renderProducts();
  renderProduction();
  updateSummary();
}

function filterCategory(cat,el){
  currentFilter = cat;
  var tabs = document.querySelectorAll('.cat-btn');
  for(var i=0;i<tabs.length;i++) tabs[i].classList.remove('active');
  el.classList.add('active');
  renderProducts();
}

function renderProducts(){
  var filtered = currentFilter==='All'? products : products.filter(function(p){return p.cat===currentFilter});
  var html = '';
  var lastCat = '';
  for(var i=0;i<filtered.length;i++){
    var p = filtered[i];
    if(p.cat!== lastCat && currentFilter==='All'){
      html += '<div class="cat-header">'+p.cat+'</div>';
      lastCat = p.cat;
    }
    var cartQty = 0;
    for(var j=0;j<cart.length;j++){
      if(cart[j].id===p.id){cartQty=cart[j].qty;break;}
    }
    html += '<div class="product-item">';
    if(cartQty>0) html += '<div class="cart-badge">'+cartQty+'</div>';
    html += '<div class="stock-badge '+(p.stock<=10?'low':p.stock==0?'zero':'')+'">'+p.stock+'</div>';
    html += '<h4>'+p.name+'</h4>';
    html += '<div class="price">₱'+p.price+'</div>';
    html += '<div class="qty-control">';
    html += '<input type="number" class="qty-input" id="qty-'+p.id+'" value="1" min="1" max="'+p.stock+'">';
    html += '<button class="btn-add-small" onclick="addToCartQty('+p.id+')" '+(p.stock<=0?'disabled':'')+'>+Add</button>';
    html += '</div></div>';
  }
  document.getElementById('productGrid').innerHTML = html;
}

function addToCartQty(id){
  var qtyInput = document.getElementById('qty-'+id);
  var qty = parseInt(qtyInput.value)||1;
  var p = null;
  for(var i=0;i<products.length;i++){
    if(products[i].id===id){p=products[i];break;}
  }
  if(!p || p.stock<=0){alert('Out of stock!');return}
  if(qty>p.stock){alert('Only '+p.stock+' pcs available!');qtyInput.value=p.stock;return}

  p.stock -= qty;

  var item = null;
  for(var i=0;i<cart.length;i++){
    if(cart[i].id===id){item=cart[i];break;}
  }
  if(item){
    item.qty+=qty;
  }else{
    cart.push({id:p.id,name:p.name,price:p.price,qty:qty});
  }

  saveData();
  renderCart();
  renderProducts();
  renderProduction();

  var newQty = Math.min(p.stock, qty + 1);
  qtyInput.value = newQty;
  qtyInput.max = p.stock;
  if(p.stock<=0) qtyInput.value = 0;
}

function renderCart(){
  var html = '';
  for(var i=0;i<cart.length;i++){
    var item = cart[i];
    html += '<div class="cart-item">';
    html += '<span>'+item.name+' x'+item.qty+'</span>';
    html += '<span>₱'+(item.price*item.qty)+' <button onclick="removeFromCart('+item.id+')" style="background:red;color:white;border:none;padding:2px 5px;border-radius:3px;margin-left:5px">X</button></span>';
    html += '</div>';
  }
  document.getElementById('cartList').innerHTML = html;
  updateTotal();
}

function removeFromCart(id){
  for(var i=0;i<cart.length;i++){
    if(cart[i].id===id){
      var p = null;
      for(var j=0;j<products.length;j++){
        if(products[j].id===id){p=products[j];break;}
      }
      if(p) p.stock += cart[i].qty;
      cart.splice(i,1);
      break;
    }
  }
  saveData();
  renderCart();
  renderProducts();
  renderProduction();
}

function updateTotal(){
  var total = 0;
  for(var i=0;i<cart.length;i++) total += cart[i].price*cart[i].qty;
  document.getElementById('cartTotal').textContent = total.toFixed(2);
  var cash = parseFloat(document.getElementById('cashAmt').value)||0;
  document.getElementById('changeAmt').textContent = Math.max(0,cash-total).toFixed(2);
}

document.getElementById('cashAmt').addEventListener('input',updateTotal);

function checkout(){
  if(cart.length===0){alert('Cart is empty!');return}
  var total = 0;
  for(var i=0;i<cart.length;i++) total += cart[i].price*cart[i].qty;
  var cash = parseFloat(document.getElementById('cashAmt').value)||0;
  if(cash<total){alert('Insufficient cash!');return}

  var transaction = {
    id:Date.now(),
    date:new Date().toLocaleString(),
    items:cart.slice(),
    total:total,
    cash:cash,
    change:cash-total
  };

  salesData.push(transaction);
  lastTransaction = transaction;
  saveData();

  cart = [];
  document.getElementById('cashAmt').value = '';
  renderCart();
  renderProducts();
  renderProduction();
  updateSummary();
  alert('Transaction saved! Change: ₱'+(cash-total).toFixed(2));
}

function printReceipt(){
  if(!lastTransaction){alert('No transaction to print!');return}
  var t = lastTransaction;
  var itemsHtml = '';
  for(var i=0;i<t.items.length;i++){
    var it = t.items[i];
    itemsHtml += '<tr><td>'+it.name+'</td><td style="text-align:center">'+it.qty
